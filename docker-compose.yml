services:
  app:
    build: .
    container_name: fintrack
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://fintrack:fintrack123@db:5432/fintrack
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-key-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  db:
    image: postgres:16-alpine
    container_name: fintrack-db
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      - POSTGRES_DB=fintrack
      - POSTGRES_USER=fintrack
      - POSTGRES_PASSWORD=fintrack123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

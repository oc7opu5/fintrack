services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindledger
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://fintrack:${DB_PASSWORD:-fintrack123}@db:5432/fintrack
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-to-a-random-32-char-string}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENCODE_ZEN_API_KEY=${OPENCODE_ZEN_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: mindledger-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=fintrack
      - POSTGRES_USER=fintrack
      - POSTGRES_PASSWORD=${DB_PASSWORD:-fintrack123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
